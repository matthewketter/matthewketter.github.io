<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Page not found — Matthew Ketter</title>
    <meta name="description" content="The page you were looking for does not exist on ketter.dev.">
    <meta name="robots" content="noindex">
    <meta name="theme-color" content="#062a57">

    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23062a57'/%3E%3Cpath d='M16 48V16h6l10 18 10-18h6v32h-6V26L34 44h-4L20 26v22z' fill='%23fbfaf7'/%3E%3C/svg%3E">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap">

    <style>
        :root {
            color-scheme: light;
            --ink: #071b3a;
            --text: #263244;
            --muted: #5d6878;
            --paper: #fbfaf7;
            --white: #ffffff;
            --navy: #062a57;
            --navy-hover: #0a376f;
            --amber: #b86e16;
            --ease: cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                transition-duration: 0.01ms !important;
            }
        }

        body {
            display: grid;
            place-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            margin: 0;
            padding: 32px;
            background:
                linear-gradient(90deg, rgba(7, 27, 58, 0.035) 1px, transparent 1px) 0 0 / 84px 84px,
                linear-gradient(180deg, #ffffff 0%, var(--paper) 54%, #ffffff 100%);
            color: var(--text);
            font-family: "Inter", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 16px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        :focus-visible {
            outline: 2px solid var(--navy);
            outline-offset: 3px;
            border-radius: 2px;
        }

        main {
            width: min(100%, 640px);
            text-align: left;
        }

        .mark {
            display: inline-grid;
            place-items: center;
            width: 56px;
            height: 56px;
            margin-bottom: 36px;
            border-radius: 12px;
            background: var(--navy);
            color: var(--paper);
            font-family: Georgia, "Times New Roman", serif;
            font-size: 1.6rem;
            font-weight: 700;
            text-decoration: none;
            transition: background-color 160ms var(--ease), transform 160ms var(--ease);
        }

        .mark:hover {
            background: var(--navy-hover);
            transform: translateY(-1px);
        }

        h1 {
            margin: 0;
            color: var(--ink);
            font-family: Georgia, "Times New Roman", serif;
            font-size: clamp(4rem, 12vw, 7rem);
            font-weight: 700;
            line-height: 1;
            letter-spacing: -0.02em;
        }

        .accent {
            width: 96px;
            height: 4px;
            margin: 24px 0 28px;
            background: var(--amber);
        }

        .message {
            max-width: 520px;
            margin: 0 0 36px;
            color: var(--ink);
            font-family: Georgia, "Times New Roman", serif;
            font-size: clamp(1.35rem, 2.4vw, 1.75rem);
            line-height: 1.35;
        }

        .sub {
            margin: 0 0 36px;
            color: var(--muted);
            font-size: 1.05rem;
        }

        .button {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            min-height: 52px;
            padding: 0 22px;
            border: 1px solid var(--navy);
            border-radius: 4px;
            background: var(--navy);
            color: var(--white);
            font-size: 0.95rem;
            font-weight: 700;
            line-height: 1;
            text-decoration: none;
            box-shadow: 0 18px 35px rgba(6, 42, 87, 0.2);
            transition: background-color 160ms var(--ease), transform 160ms var(--ease);
        }

        .button:hover {
            background: var(--navy-hover);
            transform: translateY(-1px);
        }

        .button svg {
            width: 16px;
            height: 16px;
        }

        @media (max-width: 520px) {
            .button {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>

<body>
    <main>
        <a class="mark" href="/" aria-label="Matthew Ketter — home">MK</a>
        <h1>404</h1>
        <div class="accent" aria-hidden="true"></div>
        <p class="message">That page is not here.</p>
        <p class="sub">The link may be wrong, the page may have moved, or it may never have existed.</p>
        <a class="button" href="/">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M19 12H5M11 6l-6 6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round"></path>
            </svg>
            Back to home
        </a>
    </main>
</body>

</html>
